# DalkkakAI tmux config — INVISIBLE to user
# tmux is only used for session persistence, NOT as a user-facing tool

# Mouse OFF — let xterm.js handle selection/scroll natively
# tmux mouse captures drag events, breaking copy/paste UX
set -g mouse off

# Colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Large scrollback
set -g history-limit 10000

# No delay
set -sg escape-time 0

# HIDE tmux status bar completely — user should never see tmux
set -g status off

# No visual bells or alerts
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
