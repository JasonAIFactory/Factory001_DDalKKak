# DalkkakAI tmux config — iTerm2-level experience

# Mouse support (drag select, scroll, click, resize)
set -g mouse on

# 256 color + true color
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Scrollback buffer (10000 lines)
set -g history-limit 10000

# No delay on escape key (feels instant)
set -sg escape-time 0

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar style
set -g status-style "bg=#16161e,fg=#565f89"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#565f89] %H:%M "
set -g status-left-length 20

# Active window
setw -g window-status-current-style "fg=#c0caf5,bg=#292e42,bold"
setw -g window-status-style "fg=#565f89"

# Pane borders
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# Copy mode with vi keys
setw -g mode-keys vi

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"
